name: Tests & Coverage

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run pytest
        env:
          SHEETS_SPREADSHEET_ID: test-id
          URSSAF_CLIENT_ID: test-id
          URSSAF_CLIENT_SECRET: test-secret
          SWAN_API_KEY: test-key
          SMTP_HOST: smtp.test.local
          SMTP_PORT: '587'
          SMTP_USER: test@test.local
          SMTP_PASSWORD: test
          SMTP_FROM_EMAIL: test@test.local
          SECRET_KEY: test-secret-key-min-32-chars-long
        run: |
          pytest tests/ \
            --cov=app \
            --cov-fail-under=80 \
            --cov-report=xml \
            --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
