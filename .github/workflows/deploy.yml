name: Deploy

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t sap-facture:${{ github.sha }} .
          docker tag sap-facture:${{ github.sha }} sap-facture:latest

      - name: Test Docker build
        run: |
          docker run --rm sap-facture:latest python -c "import app; print('OK')"

      - name: Push to registry (if configured)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "Docker image built successfully and ready for deployment"
          echo "Image: sap-facture:${{ github.sha }}"
          echo "Tag: sap-facture:latest"
