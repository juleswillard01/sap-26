version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sap-facture-dev
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./storage:/app/storage
      - ./.env:/app/.env:ro
    environment:
      - APP_ENV=development
      - LOG_LEVEL=DEBUG
    restart: unless-stopped
    networks:
      - sap-network

networks:
  sap-network:
    driver: bridge
