name: SAP-Facture Quality Gates (Agent Teams)
version: "2.0"
description: "Quality gate definitions using Agent Teams hooks"
source_of_truth: docs/schemas/SCHEMAS.html

# ============================================================================
# HOOKS: TeammateIdle & TaskCompleted
# ============================================================================

hooks:

  # =========================================================================
  # TeammateIdle Hook: Runs when teammate about to become idle
  # Exit code 2 = send feedback and keep teammate working
  # =========================================================================
  TeammateIdle:
    script: bmad/workflows/hooks/teammate-idle.sh
    description: "Prevent teammates from becoming idle without completion"
    trigger_conditions:
      - teammate_status: "idle"
      - assigned_task_exists: true
      - task_complete: false

    actions:
      phase_1_analysis:
        - check_deliverable_exists: [01-analysis.html, 02-prd.html, 03-ux-spec.html]
        - on_missing: "exit 2 with 'Complete your assigned deliverable and submit'"

      phase_2_architecture:
        - check_deliverable_exists: [04-architecture.html, 05-test-plan.html]
        - on_missing: "exit 2 with 'Complete 04-architecture.html and 05-test-plan.html'"

      phase_3_planning:
        - check_deliverable_exists: [06-sprint-board.html]
        - check_story_files_minimum: 5
        - on_missing: "exit 2 with 'Create minimum 5 story files and 06-sprint-board.html'"

      phase_4_development:
        - run_pytest: "pytest tests/ -q"
        - on_fail: "exit 2 with 'Fix failing tests before submitting code'"
        - check_coverage_gte_80: "pytest --cov=app --cov-fail-under=80"
        - on_fail: "exit 2 with 'Add tests to reach 80% coverage'"

      phase_5_review:
        - check_report_complete: 08-review-report.html
        - on_missing: "exit 2 with 'Complete 08-review-report.html before submitting'"

  # =========================================================================
  # TaskCompleted Hook: Runs when task marked complete
  # Exit code 2 = reject completion, send feedback
  # =========================================================================
  TaskCompleted:
    script: bmad/workflows/hooks/task-completed.sh
    description: "Validate task completion before accepting"
    trigger_on: [task_status: "completed"]

    # =========================================================================
    # GATE 1: Analysis Completeness
    # =========================================================================
    gate_1_analysis_completeness:
      phase: phase_1_analysis
      trigger_task_id: "1-7"  # Final synthesis task
      blocking: false
      description: "Validate all analysis deliverables exist and are quality"

      automated_checks:
        - id: A1.1
          name: "All HTML deliverables exist"
          check_type: file_exists
          files: [docs/bmad/deliverables/01-analysis.html, docs/bmad/deliverables/02-prd.html, docs/bmad/deliverables/03-ux-spec.html]
          on_fail: "exit 2 with 'Missing deliverable files: check list above'"

        - id: A1.2
          name: "Analysis document references SCHEMAS.html"
          check_type: grep
          file: docs/bmad/deliverables/01-analysis.html
          patterns: [SCHEMAS, schemas, Parcours, Flux, "API URSSAF"]
          on_fail: "exit 2 with 'Analysis must reference SCHEMAS.html sections 1-8'"

        - id: A1.3
          name: "PRD covers all 8 sections from SCHEMAS.html"
          check_type: grep_all
          file: docs/bmad/deliverables/02-prd.html
          patterns:
            - "Parcours Utilisateur"
            - "Flux Facturation"
            - "API URSSAF"
            - "Architecture"
            - "Donnees"
            - "Rappro Bancaire"
            - "Etats Facture"
            - "Scope MVP"
          on_fail: "exit 2 with 'PRD must map to all 8 SCHEMAS.html sections'"

        - id: A1.4
          name: "UX spec covers daily workflow"
          check_type: grep_all
          file: docs/bmad/deliverables/03-ux-spec.html
          patterns: [cours, facturation, paiement, rappro]
          flags: [case_insensitive]
          on_fail: "exit 2 with 'UX spec must cover: cours, facturation, paiement, rappro workflows'"

        - id: A1.5
          name: "No unresolved CRITICAL gaps"
          check_type: grep_negative
          file: docs/bmad/deliverables/01-analysis.html
          pattern: "CRITICAL.*unresolved"
          on_fail: "exit 2 with 'Resolve all CRITICAL gaps before submission'"

        - id: A1.6
          name: "All deliverables are valid HTML"
          check_type: html_valid
          files: [docs/bmad/deliverables/01-analysis.html, docs/bmad/deliverables/02-prd.html, docs/bmad/deliverables/03-ux-spec.html]
          on_fail: "exit 2 with 'Fix HTML validation errors'"

      pass_criteria: "All A1.1-A1.6 pass"
      pass_action: "Accept task; proceed to Phase 2"
      fail_action: "Reject task; return feedback to analyst team"

    # =========================================================================
    # GATE 2: Architecture Coherence
    # =========================================================================
    gate_2_architecture_coherence:
      phase: phase_2_architecture
      trigger_task_id: "2-6"  # Gate readiness check
      blocking: false
      description: "Validate architecture aligned to SCHEMAS.html"

      automated_checks:
        - id: A2.1
          name: "Architecture document exists"
          check_type: file_exists
          file: docs/bmad/deliverables/04-architecture.html
          on_fail: "exit 2 with 'Missing 04-architecture.html'"

        - id: A2.2
          name: "Architecture references all required technologies"
          check_type: grep_all
          file: docs/bmad/deliverables/04-architecture.html
          patterns: [FastAPI, "Google Sheets", Playwright, Indy, Pydantic]
          on_fail: "exit 2 with 'Architecture must mention: FastAPI, Google Sheets, Playwright, Indy, Pydantic'"

        - id: A2.3
          name: "No Swan API references (Indy only)"
          check_type: grep_negative
          file: docs/bmad/deliverables/04-architecture.html
          pattern: "Swan|swan"
          on_fail: "exit 2 with 'Remove all Swan references; use Indy Playwright only'"

        - id: A2.4
          name: "Database design (Google Sheets) documented"
          check_type: grep_all
          file: docs/bmad/deliverables/04-architecture.html
          patterns: ["Google Sheets", "schema|structure|table"]
          flags: [case_insensitive]
          on_fail: "exit 2 with 'Document Google Sheets schema and structure'"

        - id: A2.5
          name: "Security considerations documented"
          check_type: grep_all
          file: docs/bmad/deliverables/04-architecture.html
          patterns: [authentication, "secret|credentials", "error handling"]
          flags: [case_insensitive]
          on_fail: "exit 2 with 'Document: authentication, secrets, error handling'"

        - id: A2.6
          name: "Test plan document exists"
          check_type: file_exists
          file: docs/bmad/deliverables/05-test-plan.html
          on_fail: "exit 2 with 'Missing 05-test-plan.html'"

        - id: A2.7
          name: "Test coverage target documented (80%)"
          check_type: grep_all
          file: docs/bmad/deliverables/05-test-plan.html
          patterns: ["80", coverage, minimum]
          flags: [case_insensitive]
          on_fail: "exit 2 with 'Document 80% coverage target in test plan'"

        - id: A2.8
          name: "Test types identified (unit, integration, e2e)"
          check_type: grep_all
          file: docs/bmad/deliverables/05-test-plan.html
          patterns: [unit, integration, "e2e|end-to-end"]
          flags: [case_insensitive]
          on_fail: "exit 2 with 'Test plan must specify unit, integration, e2e test types'"

        - id: A2.9
          name: "Module structure described"
          check_type: grep_all
          file: docs/bmad/deliverables/04-architecture.html
          patterns: [adapters, models, routers, services]
          flags: [case_insensitive]
          on_fail: "exit 2 with 'Describe module structure: adapters, models, routers, services'"

      pass_criteria: "All A2.1-A2.9 pass"
      pass_action: "Accept task; proceed to Phase 3"
      fail_action: "Reject task; return feedback to architect team"

    # =========================================================================
    # GATE 3: Story Completeness
    # =========================================================================
    gate_3_story_completeness:
      phase: phase_3_planning
      trigger_task_id: "3-6"  # Gate readiness check
      blocking: false
      description: "Validate user stories complete and well-defined"

      automated_checks:
        - id: A3.1
          name: "Sprint board document exists"
          check_type: file_exists
          file: docs/bmad/deliverables/06-sprint-board.html
          on_fail: "exit 2 with 'Missing 06-sprint-board.html'"

        - id: A3.2
          name: "Minimum 5 user stories created"
          check_type: file_count
          directory: docs/stories
          pattern: "*.md"
          minimum: 5
          on_fail: "exit 2 with 'Create minimum 5 user story files (*.md)'"

        - id: A3.3
          name: "All stories have acceptance criteria"
          check_type: grep_all_files
          directory: docs/stories
          pattern: "Acceptance Criteria|Définition de fini|Given.*When.*Then"
          flags: [case_insensitive]
          on_fail: "exit 2 with 'All story files must include acceptance criteria'"

        - id: A3.4
          name: "All stories have task breakdown"
          check_type: grep_all_files
          directory: docs/stories
          pattern: "## Tasks|## Tâches|Breakdown"
          flags: [case_insensitive]
          on_fail: "exit 2 with 'All story files must include task breakdown'"

        - id: A3.5
          name: "All stories mapped to sprints"
          check_type: grep_all_files
          directory: docs/stories
          pattern: "Sprint|Backlog|Priority"
          flags: [case_insensitive]
          on_fail: "exit 2 with 'Map all stories to sprints/backlog'"

        - id: A3.6
          name: "Dependencies documented"
          check_type: grep
          file: docs/bmad/deliverables/06-sprint-board.html
          pattern: "depend|requires|blocks|prerequisite|blocked"
          flags: [case_insensitive]
          on_fail: "exit 2 with 'Document dependencies between stories'"

        - id: A3.7
          name: "Story naming convention followed"
          check_type: file_pattern
          directory: docs/stories
          pattern: "^[a-z0-9][a-z0-9-]*\\.md$"
          on_fail: "exit 2 with 'Story files must follow naming: lowercase-with-dashes.md'"

        - id: A3.8
          name: "Scope statements present"
          check_type: grep_all_files
          directory: docs/stories
          pattern: "In Scope|Out of Scope|Out-of-Scope"
          flags: [case_insensitive]
          on_fail: "exit 2 with 'All stories must define scope boundaries'"

        - id: A3.9
          name: "Stories aligned to SCHEMAS.html"
          check_type: grep_in_multiple
          directory: docs/stories
          pattern: "Parcours|Facturation|URSSAF|Donnees|Rappro|Etats"
          flags: [case_insensitive]
          minimum_files: 3
          on_fail: "exit 2 with 'Stories must reference SCHEMAS.html sections'"

        - id: A3.10
          name: "No duplicate story IDs"
          check_type: field_unique
          directory: docs/stories
          field: "^#|Story ID|ID:"
          on_fail: "exit 2 with 'Each story must have unique ID'"

      pass_criteria: "All A3.1-A3.10 pass"
      pass_action: "Accept task; proceed to Phase 4"
      fail_action: "Reject task; return feedback to scrum-master"

    # =========================================================================
    # GATE 4: Code Quality
    # =========================================================================
    gate_4_code_quality:
      phase: phase_4_development
      trigger_task_id: "4-11"  # Gate readiness check
      blocking: true
      description: "Validate code quality before proceeding to review"

      automated_checks:
        - id: A4.1
          name: "All tests pass"
          check_type: command
          command: "cd /home/jules/Documents/3-git/SAP/main && pytest tests/ -v --tb=short"
          expected_exit_code: 0
          timeout_seconds: 300
          on_fail: "exit 2 with 'All tests must pass; see pytest output'"

        - id: A4.2
          name: "Test coverage >= 80%"
          check_type: command
          command: "cd /home/jules/Documents/3-git/SAP/main && pytest tests/ --cov=app --cov-fail-under=80 --cov-report=term-missing"
          expected_exit_code: 0
          timeout_seconds: 300
          on_fail: "exit 2 with 'Coverage must be >= 80%; add tests for uncovered lines'"

        - id: A4.3
          name: "Ruff lint clean"
          check_type: command
          command: "cd /home/jules/Documents/3-git/SAP/main && ruff check app/ tests/"
          expected_exit_code: 0
          timeout_seconds: 60
          on_fail: "exit 2 with 'Fix all ruff lint violations'"

        - id: A4.4
          name: "Ruff format check"
          check_type: command
          command: "cd /home/jules/Documents/3-git/SAP/main && ruff format --check app/ tests/"
          expected_exit_code: 0
          timeout_seconds: 60
          on_fail: "exit 2 with 'Run: ruff format app/ tests/'"

        - id: A4.5
          name: "MyPy strict mode passes"
          check_type: command
          command: "cd /home/jules/Documents/3-git/SAP/main && mypy --strict app/"
          expected_exit_code: 0
          timeout_seconds: 120
          on_fail: "exit 2 with 'Fix all mypy type errors (strict mode)'"

        - id: A4.6
          name: "No hardcoded secrets"
          check_type: grep_negative_all_files
          files: [app/**/*.py, tests/**/*.py]
          patterns: ["password.*=", "secret.*=", "api.key", api_key]
          flags: [case_insensitive]
          on_fail: "exit 2 with 'Remove all hardcoded credentials; use .env instead'"

        - id: A4.7
          name: "No Swan API references"
          check_type: grep_negative_all_files
          files: [app/**/*.py, tests/**/*.py]
          pattern: "swan|Swan"
          on_fail: "exit 2 with 'Remove all Swan references; use Indy Playwright only'"

        - id: A4.8
          name: "All functions have type hints"
          check_type: ast_check
          directory: app/
          check: "function_type_hints"
          on_fail: "exit 2 with 'Add type hints to all function signatures (params + return)'"

        - id: A4.9
          name: "Pydantic BaseModel for data structures"
          check_type: grep
          files: [app/models/**/*.py]
          pattern: "class.*BaseModel"
          flags: [case_insensitive]
          on_fail: "exit 2 with 'Use Pydantic v2 BaseModel for all data structures'"

        - id: A4.10
          name: "Docstrings on public functions"
          check_type: ast_check
          directory: app/
          check: "public_function_docstrings"
          threshold_percent: 80
          on_fail: "exit 2 with 'Add docstrings to >= 80% of public functions'"

      pass_criteria: "All A4.1-A4.10 pass + manual reviews signed"
      pass_action: "Accept task; proceed to Phase 5 (Final Review)"
      fail_action: "Reject task; return to developers for fixes"

    # =========================================================================
    # GATE 5: Final Review (Opus)
    # =========================================================================
    gate_5_final_review:
      phase: phase_5_review
      trigger_task_id: "5-9"  # Gate readiness check
      blocking: true
      description: "Senior Opus review — BLOCKING for merge to main"

      automated_checks:
        - id: A5.1
          name: "All tests pass (final check)"
          check_type: command
          command: "cd /home/jules/Documents/3-git/SAP/main && pytest tests/ -v"
          expected_exit_code: 0
          timeout_seconds: 300
          on_fail: "exit 2 with 'No regressions; all tests must pass'"

        - id: A5.2
          name: "Test coverage >= 80% (final check)"
          check_type: command
          command: "cd /home/jules/Documents/3-git/SAP/main && pytest tests/ --cov=app --cov-fail-under=80"
          expected_exit_code: 0
          timeout_seconds: 300
          on_fail: "exit 2 with 'Coverage must be >= 80%'"

        - id: A5.3
          name: "Linting and formatting clean (final check)"
          check_type: command
          command: "cd /home/jules/Documents/3-git/SAP/main && ruff check app/ tests/ && ruff format --check app/ tests/"
          expected_exit_code: 0
          timeout_seconds: 60
          on_fail: "exit 2 with 'Code must pass ruff checks and formatting'"

        - id: A5.4
          name: "Type checking passes (final check)"
          check_type: command
          command: "cd /home/jules/Documents/3-git/SAP/main && mypy --strict app/"
          expected_exit_code: 0
          timeout_seconds: 120
          on_fail: "exit 2 with 'MyPy strict mode must pass'"

      pass_criteria: "A5.1-A5.4 pass + 0 CRITICAL issues + 0 HIGH security issues + SCHEMAS.html aligned"
      pass_action: "Accept task; code READY FOR PRODUCTION MERGE"
      fail_action: "Reject task; Iteration 1→Phase 4; Iteration 2→meeting; Iteration 3→escalate"
      max_iterations: 3

# ============================================================================
# HOOK IMPLEMENTATIONS
# ============================================================================

hook_implementations:
  teammate_idle_hook:
    file: bmad/workflows/hooks/teammate-idle.sh
    triggers_on: TeammateIdle
    exits_with_2_to_continue: true
    purpose: "Prevent idle without completion; nudge with feedback"

  task_completed_hook:
    file: bmad/workflows/hooks/task-completed.sh
    triggers_on: TaskCompleted
    exits_with_2_to_reject: true
    purpose: "Validate task completion; auto-reject if criteria unmet"

# ============================================================================
# METADATA
# ============================================================================

metadata:
  version: "2.0"
  date: "2026-03-18"
  author: "Claude Code Agent"
  description: "Quality gates using Agent Teams hooks"
  source_of_truth: "docs/schemas/SCHEMAS.html"
  locked_decisions: "D1-D7 from sap-facture-pipeline.yaml"
