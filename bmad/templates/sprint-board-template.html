<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAP-Facture — Sprint Board</title>
<style>
  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --border: #334155;
    --text: #e2e8f0;
    --accent: #38bdf8;
    --accent2: #a78bfa;
    --accent3: #34d399;
    --accent4: #fb923c;
    --muted: #94a3b8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
  }
  header {
    text-align: center;
    padding: 3rem 1rem 2rem;
    border-bottom: 1px solid var(--border);
  }
  header h1 {
    font-size: 2.5rem;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 0.5rem;
  }
  header p { color: var(--muted); font-size: 1.1rem; }

  nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(15, 23, 42, 0.95);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
    padding: 0.75rem 1rem;
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    justify-content: center;
  }
  nav a {
    color: var(--muted);
    text-decoration: none;
    padding: 0.4rem 1rem;
    border-radius: 6px;
    font-size: 0.85rem;
    font-weight: 500;
    transition: all 0.2s;
    border: 1px solid transparent;
  }
  nav a:hover {
    color: var(--accent);
    background: rgba(56, 189, 248, 0.1);
    border-color: rgba(56, 189, 248, 0.3);
  }
  nav button {
    background: var(--border);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.4rem 0.75rem;
    cursor: pointer;
    font-size: 0.85rem;
    font-weight: 500;
    transition: all 0.2s;
    margin-left: auto;
  }
  nav button:hover {
    background: var(--accent);
    color: #0f172a;
    border-color: var(--accent);
  }

  main { max-width: 1600px; margin: 0 auto; padding: 2rem 1rem; }

  .controls {
    display: flex;
    gap: 1rem;
    margin-bottom: 2rem;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-group {
    display: flex;
    gap: 0.5rem;
    align-items: center;
  }
  .filter-group label {
    color: var(--muted);
    font-size: 0.9rem;
    font-weight: 500;
  }
  .filter-group select {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.5rem;
    border-radius: 6px;
    font-size: 0.9rem;
    cursor: pointer;
  }
  .filter-group select:hover {
    border-color: var(--accent);
  }

  .sprint-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
    gap: 2rem;
    margin-bottom: 3rem;
  }

  .sprint-column {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    max-height: 80vh;
  }

  .sprint-header {
    padding: 1.5rem;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(135deg, rgba(56,189,248,0.1), rgba(167,139,250,0.1));
  }

  .sprint-header h2 {
    font-size: 1.2rem;
    color: var(--accent);
    margin-bottom: 0.5rem;
    font-weight: 700;
  }

  .progress-bar {
    width: 100%;
    height: 6px;
    background: rgba(0,0,0,0.3);
    border-radius: 3px;
    overflow: hidden;
    margin-top: 0.75rem;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent3), var(--accent));
    transition: width 0.3s ease;
  }

  .progress-label {
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 0.35rem;
  }

  .stories-container {
    flex: 1;
    overflow-y: auto;
    padding: 1rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .story-card {
    background: rgba(0,0,0,0.2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1rem;
    cursor: grab;
    transition: all 0.2s;
  }

  .story-card:hover {
    border-color: var(--accent);
    background: rgba(56,189,248,0.05);
  }

  .story-card.dragging {
    opacity: 0.6;
    cursor: grabbing;
  }

  .story-title {
    font-weight: 600;
    color: var(--text);
    margin-bottom: 0.5rem;
    font-size: 0.95rem;
    line-height: 1.4;
  }

  .story-meta {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-bottom: 0.5rem;
    align-items: center;
  }

  .story-points {
    background: rgba(56,189,248,0.2);
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 0.2rem 0.6rem;
    border-radius: 4px;
    font-size: 0.75rem;
    font-weight: 600;
  }

  .badge {
    display: inline-block;
    padding: 0.25rem 0.5rem;
    border-radius: 4px;
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
  }

  .badge.p0 { background: #dc2626; color: white; }
  .badge.p1 { background: #fb923c; color: white; }
  .badge.p2 { background: #38bdf8; color: #0f172a; }

  .story-dependencies {
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 0.5rem;
    padding-top: 0.5rem;
    border-top: 1px solid rgba(56,189,248,0.2);
  }

  .story-dependencies strong {
    color: var(--accent4);
  }

  .empty-column {
    text-align: center;
    padding: 2rem 1rem;
    color: var(--muted);
    font-size: 0.9rem;
  }

  .sprint-stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 1rem;
    margin-bottom: 3rem;
  }

  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    text-align: center;
  }

  .stat-label {
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 0.5rem;
    font-weight: 500;
  }

  .stat-value {
    font-size: 2rem;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  footer {
    text-align: center;
    padding: 2rem;
    color: var(--muted);
    font-size: 0.8rem;
    border-top: 1px solid var(--border);
  }

  .scrollbar-custom::-webkit-scrollbar {
    width: 8px;
  }
  .scrollbar-custom::-webkit-scrollbar-track {
    background: rgba(0,0,0,0.1);
    border-radius: 4px;
  }
  .scrollbar-custom::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 4px;
  }
  .scrollbar-custom::-webkit-scrollbar-thumb:hover {
    background: var(--accent);
  }
</style>
</head>
<body>

<header>
  <h1>Sprint Board — SAP-Facture</h1>
  <p>Kanban Board & Story Tracking</p>
</header>

<nav>
  <a href="#board">Board</a>
  <a href="#stats">Stats</a>
</nav>

<main>

<div class="controls">
  <div class="filter-group">
    <label for="sprint-filter">Sprint:</label>
    <select id="sprint-filter" onchange="filterBoard()">
      <option value="">All Sprints</option>
      {{SPRINT_OPTIONS}}
    </select>
  </div>
  <div class="filter-group">
    <label for="priority-filter">Priority:</label>
    <select id="priority-filter" onchange="filterBoard()">
      <option value="">All Priorities</option>
      <option value="P0">P0 - Critical</option>
      <option value="P1">P1 - Important</option>
      <option value="P2">P2 - Nice-to-have</option>
    </select>
  </div>
  <div class="filter-group">
    <label for="status-filter">Status:</label>
    <select id="status-filter" onchange="filterBoard()">
      <option value="">All Statuses</option>
      <option value="BACKLOG">Backlog</option>
      <option value="IN_PROGRESS">In Progress</option>
      <option value="DONE">Done</option>
    </select>
  </div>
</div>

<div id="board" class="sprint-container">
  {{SPRINT_BOARD}}
</div>

<div id="stats" class="sprint-stats">
  <div class="stat-card">
    <div class="stat-label">Total Stories</div>
    <div class="stat-value">{{TOTAL_STORIES}}</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Points Completed</div>
    <div class="stat-value">{{POINTS_COMPLETED}}</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Velocity (avg)</div>
    <div class="stat-value">{{VELOCITY}}</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Sprint Progress</div>
    <div class="stat-value">{{SPRINT_PROGRESS}}%</div>
  </div>
</div>

</main>

<footer>SAP-Facture — BMAD Pipeline — Sprint Board — Generated {{DATE}}</footer>

<script>
function filterBoard() {
  var sprintFilter = document.getElementById('sprint-filter').value;
  var priorityFilter = document.getElementById('priority-filter').value;
  var statusFilter = document.getElementById('status-filter').value;

  var cards = document.querySelectorAll('.story-card');
  cards.forEach(function(card) {
    var sprint = card.dataset.sprint || '';
    var priority = card.dataset.priority || '';
    var status = card.dataset.status || '';

    var show = true;
    if (sprintFilter && sprint !== sprintFilter) show = false;
    if (priorityFilter && priority !== priorityFilter) show = false;
    if (statusFilter && status !== statusFilter) show = false;

    card.style.display = show ? 'block' : 'none';
  });
}

document.addEventListener('DOMContentLoaded', function() {
  var stories = document.querySelectorAll('.story-card');
  var draggedElement = null;

  stories.forEach(function(story) {
    story.addEventListener('dragstart', function(e) {
      draggedElement = this;
      this.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });

    story.addEventListener('dragend', function(e) {
      this.classList.remove('dragging');
      draggedElement = null;
    });
  });

  var columns = document.querySelectorAll('.stories-container');
  columns.forEach(function(column) {
    column.classList.add('scrollbar-custom');

    column.addEventListener('dragover', function(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      this.style.background = 'rgba(56,189,248,0.1)';
    });

    column.addEventListener('dragleave', function(e) {
      if (e.target === this) {
        this.style.background = 'transparent';
      }
    });

    column.addEventListener('drop', function(e) {
      e.preventDefault();
      this.style.background = 'transparent';
      if (draggedElement && draggedElement !== this) {
        this.appendChild(draggedElement);
      }
    });
  });
});
</script>
</body>
</html>
