version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: sap-facture-dev
    ports:
      - "8000:8000"
    environment:
      # Credentials Google
      GOOGLE_CREDENTIALS_JSON: ${GOOGLE_CREDENTIALS_JSON}
      SHEETS_SPREADSHEET_ID: ${SHEETS_SPREADSHEET_ID}
      SHEETS_DRIVE_FOLDER_ID: ${SHEETS_DRIVE_FOLDER_ID}

      # URSSAF API (sandbox)
      URSSAF_CLIENT_ID: ${URSSAF_CLIENT_ID}
      URSSAF_CLIENT_SECRET: ${URSSAF_CLIENT_SECRET}
      URSSAF_API_BASE_URL: ${URSSAF_API_BASE_URL}

      # Swan API (sandbox)
      SWAN_API_KEY: ${SWAN_API_KEY}
      SWAN_API_BASE_URL: ${SWAN_API_BASE_URL}

      # Email (Mailtrap ou Gmail)
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL}

      # App
      APP_ENVIRONMENT: development
      APP_LOG_LEVEL: DEBUG
      APP_DEBUG: "true"
      SECRET_KEY: ${SECRET_KEY}

    volumes:
      - .:/app
      - /app/venv
      - /app/.venv
      - ./logs:/app/logs

    networks:
      - sap-network

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

networks:
  sap-network:
    driver: bridge
